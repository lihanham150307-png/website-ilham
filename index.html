            display: inline-block;

            background-color: #25D366;
            color: white;
            text-decoration: none;

        }

        }

        .layanan {
            background: white;
            margin: 10px auto;
            padding: 15px;
            border-radius: 10px;
            width: 250px;
        }

        .testimoni {
            background: #ffe4ec;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }

    </style>
</head>

        </div>

</body>
</html>
